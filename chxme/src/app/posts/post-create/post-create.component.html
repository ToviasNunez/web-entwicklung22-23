<mat-card>
  <mat-spinner *ngIf="isLoading"></mat-spinner>
  <form [formGroup]="form" (submit)="onSavePost()" *ngIf="!isLoading">
    <mat-form-field appearance="fill">
      <mat-label>Choose a country</mat-label>
      <mat-select [formControlName]="'country'">
        <mat-option
          *ngFor="let country of this.getCountriesList()"
          [value]="country"
          >{{ country }}</mat-option
        >
        <mat-error *ngIf="form.get('country').invalid"
          >Please selected the country</mat-error
        >
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Choose a city</mat-label>
      <mat-select formControlName="city">
        <mat-option
          *ngFor="let city of this.getCitiesFromCountry(form.value.country)"
          [value]="city.name"
        >
          {{ city.name }}</mat-option
        >
        <mat-error *ngIf="form.get('city').invalid"
          >Please selected the city</mat-error
        >
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Choose a topic</mat-label>
      <mat-select formControlName="topic">
        <mat-option
          *ngFor="let topic of this.selectTitles"
          [value]="topic.name"
          >{{ topic.name }}</mat-option
        >
        <mat-error *ngIf="form.get('topic').invalid"> </mat-error>
      </mat-select>
    </mat-form-field>

    <ngb-rating
      formControlName="rate"
      appendTo="body"
      [(rate)]="form.value.rate"
      (hover)="hovered = $event"
      (leave)="hovered = 1"
      [readonly]="readonly"
    >
    </ngb-rating>

    <!-- upload pictures -->
    <div>
      <button
        class="pick-image"
        mat-stroked-button
        type="button"
        (click)="filePicker.click()"
      >
        Pick Image
      </button>
      <input type="file" #filePicker (change)="onImagePicked($event)" />
    </div>

    <div
      class="image-preview"
      *ngIf="imagePreview !== ' ' && imagePreview && form.get('image').valid"
    >
      <img [src]="imagePreview" [alt]="form.value.country" />
    </div>

<!-- subtitel-->
 <mat-form-field>
  <input matInput class="subtitel" type="text" formControlName="subtitel" placeholder="Subtitel">
   <mat-error *ngIf="form.get('subtitel').invalid">
        Please enter the content more than 3 character</mat-error
      >
 </mat-form-field>



    <mat-form-field>
      <textarea
        formControlName="content"
        placeholder="Post Content"
        matInput
        rows="6"
      ></textarea>
      <mat-error *ngIf="form.get('content').invalid">
        Please enter the content more than 3 character</mat-error
      >
    </mat-form-field>

    <button class="save-post" mat-raised-button color="accent" type="submit">
      Save Post
    </button>
  </form>
</mat-card>
